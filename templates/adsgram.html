<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earn Free Funds</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Telegram Native Colors */
        body {
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        .container { text-align: center; padding: 20px; max-width: 400px; width: 100%; }
        .icon-box {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            width: 80px; height: 80px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 35px; margin: 0 auto 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { font-size: 15px; color: var(--tg-theme-hint-color, #999999); margin-bottom: 30px; line-height: 1.5; }
        
        /* Premium Button */
        .btn-main {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; border-radius: 12px; padding: 16px 20px; font-size: 16px; font-weight: 600; width: 100%; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-main:active { transform: scale(0.96); }
        .btn-main:disabled { background-color: var(--tg-theme-hint-color, #999999); cursor: not-allowed; transform: none; }
        
        #status { margin-top: 20px; font-weight: 500; font-size: 14px; min-height: 20px; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-box"><i class="fas fa-gift"></i></div>
        <h1>Daily Rewards</h1>
        <p>Watch short sponsored videos to earn free funds directly to your bot balance. You can watch an ad every 5 minutes!</p>

        <button id="showAdBtn" class="btn-main" onclick="showAd()">
            <i class="fas fa-play-circle"></i> Watch Video & Earn
        </button>
        
        <div id="status"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // 🟢 Adsgram ইনিশিয়ালাইজেশন
        const AdController = window.Adsgram.init({ blockId: "YOUR_ADSGRAM_BLOCK_ID" });

        function showAd() {
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('showAdBtn');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading Ad...';
            statusEl.innerText = "";
            statusEl.className = "";

            AdController.show().then((result) => {
                // অ্যাড দেখা শেষ
                btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> Claiming...';
                claimReward();
            }).catch((result) => {
                // অ্যাড স্কিপ করেছে বা লোড হয়নি
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play-circle"></i> Watch Video & Earn';
                statusEl.innerText = "Ad canceled or failed to load.";
                statusEl.className = "error";
                tg.HapticFeedback.notificationOccurred("error");
            });
        }

        function claimReward() {
            fetch('/api/adsgram_reward', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    initData: tg.initData,
                    user_id: tg.initDataUnsafe?.user?.id
                })
            })
            .then(res => res.json())
            .then(data => {
                const statusEl = document.getElementById('status');
                const btn = document.getElementById('showAdBtn');
                
                if(data.status === "success") {
                    statusEl.innerText = data.msg;
                    statusEl.className = "success";
                    tg.HapticFeedback.notificationOccurred("success");
                    startCooldown(btn, 300); // 300 সেকেন্ড = ৫ মিনিট
                } else {
                    statusEl.innerText = data.msg;
                    statusEl.className = "error";
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-play-circle"></i> Try Again';
                    tg.HapticFeedback.notificationOccurred("error");
                }
            })
            .catch(err => {
                document.getElementById('status').innerText = "Network Error! Please try again.";
                document.getElementById('status').className = "error";
                document.getElementById('showAdBtn').disabled = false;
                document.getElementById('showAdBtn').innerHTML = '<i class="fas fa-play-circle"></i> Watch Video & Earn';
            });
        }

        // 🕒 ভিজ্যুয়াল টাইমার
        function startCooldown(btn, seconds) {
            let timeLeft = seconds;
            btn.disabled = true;
            
            const timer = setInterval(() => {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                btn.innerHTML = `<i class="fas fa-clock"></i> Next ad in ${m}:${s < 10 ? '0' : ''}${s}`;
                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-play-circle"></i> Watch Video & Earn';
                    document.getElementById('status').innerText = "You can watch another ad now!";
                    document.getElementById('status').className = "success";
                }
            }, 1000);
        }
    </script>
</body>
</html>
